name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "PRODUCT_ID_X1=placeholder_x1" >> local.properties
          echo "PRODUCT_ID_X2=placeholder_x2" >> local.properties
          echo "PRODUCT_ID_X3=placeholder_x3" >> local.properties
          echo "PRODUCT_ID_X4=placeholder_x4" >> local.properties
          echo "SUBSCRIPTION_ID_X1=placeholder_sub_x1" >> local.properties
          echo "SUBSCRIPTION_ID_X2=placeholder_sub_x2" >> local.properties
          echo "SUBSCRIPTION_ID_X3=placeholder_sub_x3" >> local.properties
          echo "SUBSCRIPTION_YEAR_ID_X1=placeholder_year_x1" >> local.properties
          echo "SUBSCRIPTION_YEAR_ID_X2=placeholder_year_x2" >> local.properties
          echo "SUBSCRIPTION_YEAR_ID_X3=placeholder_year_x3" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build Release APK
        run: ./gradlew assembleFossRelease
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep "VERSION_NAME" gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/foss/release/*.apk release/Novohe3-v${{ steps.version.outputs.name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-${{ github.run_number }}
          name: "Novohe3 v${{ steps.version.outputs.name }}"
          body: |
            APK gerado automaticamente do commit `${{ github.sha }}`
          files: release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
